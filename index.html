<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Scripts (order matters!) -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center mb-6"><i class="fas fa-trophy text-yellow-400"></i> Leaderboard</h1>

    <!-- USER INFO -->
    <div id="userBox" class="text-center mb-8 hidden">
        <p>Welcome <i class="fas fa-hand-wave text-blue-400"></i> <span id="userEmail"></span></p>
        <p class="text-xl mt-2">
            Your Score: <span id="userScore" class="text-green-400 font-bold"></span>
        </p>
    </div>

    <!-- TOP 3 -->
    <div class="mb-10">
        <h2 class="text-2xl mb-3"><i class="fas fa-fire text-orange-500"></i> Top 3</h2>
        <div id="top3" class="space-y-2"></div>
    </div>

    <!-- LAST 3 -->
    <div>
        <h2 class="text-2xl mb-3"><i class="fas fa-skull text-red-500"></i> Last 3</h2>
        <div id="last3" class="space-y-2"></div>
    </div>

    <script>
        // Page-specific initialization
        (async function init() {
            const user = await Auth.requireAuth();
            if (!user) return;

            await Leaderboard.load();
            await Leaderboard.loadUserBox(user);
        })();
    </script>

</body>

</html>
