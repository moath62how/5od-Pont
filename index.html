<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المتصدرين</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Scripts (order matters!) -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/index.js"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen p-6">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-yellow-400 mb-4"></i>
            <p class="text-xl">جاري التحميل...</p>
        </div>
    </div>

    <h1 class="text-3xl font-bold text-center mb-6"><i class="fas fa-trophy text-yellow-400"></i> لوحة البونطات</h1>

    <!-- PROFILE BUTTON (shown when not logged in) -->
    <div id="profileButton" class="fixed top-4 right-4 z-40 hidden">
        <button onclick="showLoginPrompt()"
            class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition">
            <i class="fas fa-user text-xl"></i>
        </button>
    </div>

    <!-- USER PROFILE MENU (shown when logged in) -->
    <div id="userProfileMenu" class="fixed top-4 right-4 z-40 hidden">
        <button onclick="toggleProfileMenu()" class="relative">
            <img id="headerAvatar" src="" alt="Profile"
                class="w-12 h-12 rounded-full border-2 border-yellow-400 hover:border-yellow-300 transition cursor-pointer">
        </button>
        <div id="profileDropdown"
            class="hidden absolute right-0 mt-2 w-48 bg-gray-800 rounded-lg shadow-xl border border-gray-700">
            <div class="p-3 border-b border-gray-700">
                <p id="dropdownName" class="font-bold text-white"></p>
                <p id="dropdownPoints" class="text-sm text-green-400"></p>
            </div>
            <button onclick="openProfileSettings()" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition">
                <i class="fas fa-cog"></i> الإعدادات
            </button>
            <button onclick="Auth.logout()"
                class="w-full text-right px-4 py-2 hover:bg-gray-700 transition text-red-400">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
        </div>
    </div>

    <!-- LOGIN PROMPT MODAL -->
    <div id="loginPromptModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-6 rounded-xl max-w-sm w-full mx-4 shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold text-center mb-4">
                <i class="fas fa-user-circle text-blue-400"></i> تسجيل الدخول
            </h2>
            <p class="text-center text-gray-300 mb-6">يجب تسجيل الدخول للوصول إلى الملف الشخصي</p>
            <div class="space-y-3">
                <button onclick="window.location.href='login.html'"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <button onclick="window.location.href='sign-up.html'"
                    class="w-full bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-user-plus"></i> إنشاء حساب جديد
                </button>
                <button onclick="closeLoginPrompt()"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-times"></i> إلغاء
                </button>
            </div>
        </div>
    </div>

    <!-- USER INFO -->
    <div id="userBox" class="text-center mb-8 hidden">
        <img id="userAvatar" src="" alt="Avatar" class="w-20 h-20 rounded-full mx-auto mb-2 border-2 border-yellow-400">
        <p>أهلاً <i class="fas fa-hand-wave text-blue-400"></i> <span id="userName"></span></p>
        <p class="text-xl mt-2">
            بنوطاتك: <span id="userScore" class="text-green-400 font-bold"></span>
        </p>
    </div>

    <!-- TOP 3 -->
    <div class="mb-10">
        <h2 class="text-2xl mb-3 text-center"><i class="fas fa-fire text-orange-500"></i> افحل ثلاثه</h2>
        <div id="top3" class="flex justify-center items-end gap-4"></div>
    </div>

    <!-- LAST 3 -->
    <div class="mb-10">
        <h2 class="text-2xl mb-3 text-center"><i class="fas fa-skull text-red-500"></i> ابضن ثلاثه</h2>
        <div id="last3" class="flex justify-center items-end gap-8"></div>
    </div>

    <!-- VOTE BUTTON -->
    <div class="text-center mb-10">
        <a href="vote.html"
            class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-full font-bold transition">
            <i class="fas fa-vote-yea"></i>تصويت لبونط جديد
        </a>
    </div>

    <!-- FULL LEADERBOARD -->
    <div>
        <h2 class="text-2xl mb-3"><i class="fas fa-list text-blue-400"></i> جميع اللاعبين</h2>
        <div id="leaderboard" class="space-y-2"></div>
    </div>

</body>

</html>
