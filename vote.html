<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التصويت</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Scripts (order matters!) -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/vote.js"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen p-4">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="text-center">
            <i class="fas fa-spinner fa-spin text-4xl text-yellow-400 mb-4"></i>
            <p class="text-xl">جاري التحميل...</p>
        </div>
    </div>

    <h1 class="text-3xl font-bold text-center mb-6"><i class="fas fa-vote-yea text-blue-400"></i> نظام التصويت</h1>

    <!-- PROFILE BUTTON (shown when not logged in) -->
    <div id="profileButton" class="fixed top-4 left-4 z-40 hidden">
        <button onclick="showLoginPrompt()"
            class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition">
            <i class="fas fa-user text-xl"></i>
        </button>
    </div>

    <!-- USER PROFILE MENU (shown when logged in) -->
    <div id="userProfileMenu" class="fixed top-4 left-4 z-40 hidden">
        <button onclick="toggleProfileMenu()" class="relative">
            <img id="headerAvatar" src="" alt="Profile"
                class="w-12 h-12 rounded-full border-2 border-yellow-400 hover:border-yellow-300 transition cursor-pointer">
        </button>
        <div id="profileDropdown"
            class="hidden absolute left-0 mt-2 w-48 bg-gray-800 rounded-lg shadow-xl border border-gray-700">
            <div class="p-3 border-b border-gray-700">
                <p id="dropdownName" class="font-bold text-white"></p>
                <p id="dropdownPoints" class="text-sm text-green-400"></p>
            </div>
            <button onclick="openProfileSettings()" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition">
                <i class="fas fa-cog"></i> الإعدادات
            </button>
            <button onclick="Auth.logout()"
                class="w-full text-right px-4 py-2 hover:bg-gray-700 transition text-red-400">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
        </div>
    </div>

    <!-- LOGIN PROMPT MODAL -->
    <div id="loginPromptModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-6 rounded-xl max-w-sm w-full mx-4 shadow-2xl border border-gray-700">
            <h2 class="text-2xl font-bold text-center mb-4">
                <i class="fas fa-user-circle text-blue-400"></i> تسجيل الدخول
            </h2>
            <p class="text-center text-gray-300 mb-6">يجب تسجيل الدخول للوصول إلى الملف الشخصي</p>
            <div class="space-y-3">
                <button onclick="window.location.href='login.html'"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                </button>
                <button onclick="window.location.href='sign-up.html'"
                    class="w-full bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-user-plus"></i> إنشاء حساب جديد
                </button>
                <button onclick="closeLoginPrompt()"
                    class="w-full bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-bold transition">
                    <i class="fas fa-times"></i> إلغاء
                </button>
            </div>
        </div>
    </div>
    <p id="dropdownName" class="font-bold text-white"></p>
    <p id="dropdownPoints" class="text-sm text-green-400"></p>
    </div>
    <button onclick="openProfileSettings()" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition">
        <i class="fas fa-cog"></i> الإعدادات
    </button>
    <button onclick="Auth.logout()" class="w-full text-right px-4 py-2 hover:bg-gray-700 transition text-red-400">
        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
    </button>
    </div>
    </div>

    <!-- BACK BUTTON -->
    <div class="mb-4">
        <a href="index.html"
            class="inline-flex items-center gap-2 bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg transition">
            <i class="fas fa-arrow-right"></i> رجوع للوحة المتصدرين
        </a>
    </div>

    <!-- CREATE VOTE -->
    <div class="bg-white/10 p-4 rounded-xl mb-6">
        <h3 class="text-xl font-bold mb-3">إنشاء تصويت جديد</h3>

        <input id="title" placeholder="عنوان التصويت" class="w-full p-2 mb-2 rounded bg-black/50 text-white">

        <select id="targetUser" class="w-full p-2 mb-2 rounded bg-black/50 text-white">
            <option value="">اختر اللاعب المستهدف...</option>
        </select>

        <input id="file" type="file" accept="image/*" class="w-full mb-2 text-gray-300">

        <div class="mb-2">
            <label class="block text-sm mb-1 text-gray-300">مدة التصويت (بالدقائق)</label>
            <input id="voteDuration" type="number" min="1" max="1440" value="10" placeholder="10"
                class="w-full p-2 rounded bg-black/50 text-white">
            <p class="text-xs text-gray-400 mt-1">الحد الأدنى: 1 دقيقة | الحد الأقصى: 24 ساعة (1440 دقيقة)</p>
        </div>

        <button onclick="Vote.createVote()" class="w-full bg-purple-600 hover:bg-purple-700 p-2 rounded transition">
            إنشاء تصويت <i class="fas fa-plus"></i>
        </button>

        <!-- Message container -->
        <div id="msg" class="mt-2"></div>
    </div>

    <!-- VOTES LIST -->
    <div id="votes" class="space-y-4"></div>

    <script>
        // Show login prompt modal
        function showLoginPrompt() {
            document.getElementById('loginPromptModal').classList.remove('hidden');
        }

        // Close login prompt modal
        function closeLoginPrompt() {
            document.getElementById('loginPromptModal').classList.add('hidden');
        }

        // Toggle profile dropdown
        function toggleProfileMenu() {
            const dropdown = document.getElementById('profileDropdown');
            dropdown.classList.toggle('hidden');
        }

        // Open profile settings
        function openProfileSettings() {
            window.location.href = 'profile.html';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function (event) {
            const menu = document.getElementById('userProfileMenu');
            const dropdown = document.getElementById('profileDropdown');
            if (menu && !menu.contains(event.target)) {
                dropdown?.classList.add('hidden');
            }
        });

        // Initialize
        (async function init() {
            const user = await db.getUser();

            if (!user) {
                // Show login button
                document.getElementById('profileButton')?.classList.remove('hidden');
            } else {
                // Show user profile menu
                const userData = await db.getUserById(user.id);
                if (userData) {
                    const profileMenu = document.getElementById('userProfileMenu');
                    const headerAvatar = document.getElementById('headerAvatar');
                    const dropdownName = document.getElementById('dropdownName');
                    const dropdownPoints = document.getElementById('dropdownPoints');

                    if (profileMenu) profileMenu.classList.remove('hidden');
                    if (headerAvatar) headerAvatar.src = Leaderboard.getAvatar(userData.name, userData.profile_pic);
                    if (dropdownName) dropdownName.textContent = userData.name;
                    if (dropdownPoints) dropdownPoints.textContent = `${userData.points} نقطة`;
                }

                await Vote.loadUsers();
            }

            // Load votes for everyone (logged in or not)
            await Vote.load();

            // Hide loader
            document.getElementById('loader')?.classList.add('hidden');
        })();
    </script>

</body>

</html>
