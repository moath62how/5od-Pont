<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Scripts (order matters!) -->
    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</head>

<body
    class="bg-gradient-to-br from-black via-gray-900 to-black text-white flex items-center justify-center min-h-screen">

    <div id="card" class="bg-white/10 backdrop-blur-xl p-6 rounded-2xl w-full max-w-sm shadow-2xl">

        <h1 class="text-2xl font-bold text-center mb-5"><i class="fas fa-fire text-orange-500"></i> Login</h1>

        <!-- Email -->
        <input id="email" type="email" placeholder="Email"
            class="w-full p-3 mb-3 rounded-lg bg-black/50 focus:outline-none focus:ring-2 focus:ring-purple-500">

        <!-- Password -->
        <input id="password" type="password" placeholder="Password"
            class="w-full p-3 mb-4 rounded-lg bg-black/50 focus:outline-none focus:ring-2 focus:ring-purple-500">

        <!-- Login -->
        <button onclick="handleLogin()" class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-xl transition">
            Login
        </button>

        <!-- Signup -->
        <button onclick="window.location.href='sign-up.html'"
            class="w-full mt-2 bg-gray-700 hover:bg-gray-800 p-3 rounded-xl transition">
            Create Account
        </button>

        <!-- Message -->
        <p id="msg" class="text-center mt-4 text-sm"></p>

    </div>

    <script>
        // Check if already logged in
        Auth.redirectIfAuth();

        // GSAP Animation
        gsap.from("#card", {
            opacity: 0,
            y: 60,
            duration: 0.8,
            ease: "power2.out"
        });

        // Page-specific handlers
        async function handleLogin() {
            try {
                const email = Utils.$("email").value;
                const password = Utils.$("password").value;
                await Auth.login(email, password);
                Utils.showMsg("Login successful <i class='fas fa-rocket'></i>", "green");
                Utils.redirectTo(CONFIG.PAGES.INDEX);
            } catch (error) {
                Utils.showMsg(error.message, "red");
            }
        }

        async function handleSignup() {
            try {
                const email = Utils.$("email").value;
                const password = Utils.$("password").value;
                await Auth.signUp("User", email, password);
                Utils.showMsg("Account created <i class='fas fa-check-circle text-green-400'></i>", "green");
                Utils.redirectTo(CONFIG.PAGES.LOGIN, 1200);
            } catch (error) {
                Utils.showMsg(error.message, "red");
            }
        }
        /* =========================
        📱 TILT EFFECT (PHONE SENSOR)
        ========================= */
        window.addEventListener("deviceorientation", (e) => {
            const card = document.getElementById("card")

            const x = e.gamma / 12
            const y = e.beta / 12

            card.style.transform =
                `rotateY(${x}deg) rotateX(${y}deg)`
        })

        /* =========================
        🍎 iPhone Permission Fix
        ========================= */
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.body.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
            }, { once: true })
        }
    </script>

</body>

</html>
